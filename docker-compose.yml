name: nfl-model-platform

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - internal

  api:
    image: ghcr.io/${IMAGE:-samuel/nfl-model-platform}:${TAG:-latest}
    ports:
      - "8080:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - API_CONFIG_PATH=/app/config/api.yaml
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./config:/app/config:ro
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
